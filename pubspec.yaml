name: skycast
description: "A production-grade weather application built with Flutter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.5.0

  # State Management
  flutter_riverpod: ^3.0.3

  # Navigation
  go_router: ^16.2.1

  # Date & Time
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.3.2

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.3.2

  # Image Caching
  cached_network_image: ^3.4.1

  # Local Storage
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/