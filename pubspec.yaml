name: skycast
description: "A production-ready cinematic weather application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.9.0

  # Fonts
  google_fonts: ^6.3.1

  # SVG
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/weather/
    - assets/animations/

    # We'll add these later
    # - assets/fonts/
    # - assets/sounds/

  fonts: []